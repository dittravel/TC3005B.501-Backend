paths:
  /erp/employees:
    get:
      summary: Get employee master data for ERP consumption
      tags:
        - Integrations
      operationId: getERPEmployees
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: updated_since
          schema:
            type: string
            format: date-time
        - in: query
          name: department_id
          schema:
            type: integer
        - in: query
          name: active_only
          schema:
            type: boolean
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Employee data returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        employee_id:
                          type: integer
                        username:
                          type: string
                        email:
                          type: string
                        phone_number:
                          type: string
                          nullable: true
                        workstation:
                          type: string
                        role:
                          type: object
                          properties:
                            name:
                              type: string
                        department:
                          type: object
                          properties:
                            department_id:
                              type: integer
                              nullable: true
                            department_name:
                              type: string
                              nullable: true
                            cost_center:
                              type: string
                              nullable: true
                        reports_to:
                          type: object
                          properties:
                            employee_id:
                              type: integer
                              nullable: true
                        status:
                          type: object
                          properties:
                            active:
                              type: boolean
                        audit:
                          type: object
                          properties:
                            created_at:
                              type: string
                              format: date-time
                              nullable: true
                            updated_at:
                              type: string
                              format: date-time
                              nullable: true
                  meta:
                    type: object
                    properties:
                      count:
                        type: integer
                      total_count:
                        type: integer
                      has_more:
                        type: boolean
                      filters:
                        type: object
                        properties:
                          updated_since:
                            type: string
                            format: date-time
                            nullable: true
                          department_id:
                            type: integer
                            nullable: true
                          active_only:
                            type: boolean
                          limit:
                            type: integer
                          offset:
                            type: integer
              example:
                data:
                  - employee_id: 21
                    username: admin
                    email: admin@company.com
                    phone_number: "555-0000"
                    workstation: ADMIN-WS
                    role:
                      name: Administrador
                    department:
                      department_id: 6
                      department_name: Admin
                      cost_center: ADMIN
                    reports_to:
                      employee_id: null
                    status:
                      active: true
                    audit:
                      created_at: "2026-03-01T10:00:00.000Z"
                      updated_at: "2026-03-20T12:00:00.000Z"
                meta:
                  count: 1
                  total_count: 1
                  has_more: false
                  filters:
                    updated_since: "2026-03-01T00:00:00.000Z"
                    department_id: null
                    active_only: true
                    limit: 50
                    offset: 0
        "400":
          description: Invalid query parameters
        "401":
          description: Authentication token missing
        "403":
          description: Access denied
