# docker-compose.backup.yml
#
# Runs a self-hosted MinIO instance for storing DitTravel backup archives.
# Deploy this on a SEPARATE machine from the application server so backups
# survive a server failure.
#
# Usage:
#   docker compose -f docker-compose.backup.yml up -d
#
# Then create the bucket (one-time setup):
#   docker exec dittravel-minio mc alias set local http://localhost:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD
#   docker exec dittravel-minio mc mb local/dittravel-backups
#
# MinIO console available at: http://<host>:9001

services:
  minio:
    image: minio/minio:latest
    container_name: dittravel-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API — used by backup.sh
      - "9001:9001"   # Web console — for browsing/downloading archives
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  minio_data:
    driver: local
