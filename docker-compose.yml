services:
  mongodb:
    image: mongo:7
    container_name: tc3005-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  mariadb:
    image: mariadb:11.4
    container_name: tc3005-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: AQUÍIRIAcOCOsCHEMECREO
      MARIADB_USER: CAMBIENESTO
      MARIADB_PASSWORD: IDK
      MARIADB_ROOT_PASSWORD: DEPENDEQUEHAYANPUESTO
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/Schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tc3005-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: CocoScheme
      DB_USER: travel_user
      DB_PASSWORD: password
      JWT_SECRET: "CAMBIARESTOALGUIEN"
      AES_SECRET_KEY: "12345678901234567890123456789012"
      AES_IV: "1234567890123456"
      MAIL_USER: test.mail@outlook.com
      MAIL_PASSWORD: password
      MONGO_URI: mongodb://mongodb:27017
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ../TC3005B.501-Frontend
      dockerfile: Dockerfile
      args:
        PUBLIC_API_BASE_URL: https://localhost:3000/api
        PUBLIC_IS_DEV: "false"
    container_name: tc3005-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PUBLIC_API_BASE_URL: https://localhost:3000/api
      PUBLIC_IS_DEV: false
      HOST: 0.0.0.0
      PORT: 4321
    ports:
      - "4321:4321"

volumes:
  mongodb_data:
  mariadb_data: